<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Smart Planner{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f8f9fa;
    color: #212529;
    transition: background 0.3s, color 0.3s;
}

body.dark-mode {
    background-color: #121212 !important;
    color: #e0e0e0 !important;
}

.dark-mode .card {
    background-color: #1f1f1f !important;
    color: #e0e0e0 !important;
}

.dark-mode .navbar {
    background-color: #000 !important;
}

.dark-mode .form-control,
.dark-mode input,
.dark-mode select {
    background-color: #2a2a2a;
    color: #e0e0e0;
    border-color: #444;
}

.dark-mode .btn-outline-light {
    border-color: #777 !important;
}

.dark-mode .alert-info {
    background-color: #333;
    border-color: #555;
    color: #cfd8dc;
}
</style>

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <a class="navbar-brand" href="/">Smart Planner</a>
  <button id="darkToggle" class="btn btn-outline-light ms-auto">
    🌙
  </button>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} mt-3 text-center flash-msg">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (localStorage.getItem("darkmode") === "enabled") {
    document.body.classList.add("dark-mode");
    const btn = document.getElementById("darkToggle");
    if (btn) btn.textContent = "☀️";
}
document.getElementById("darkToggle")?.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
    const btn = document.getElementById("darkToggle");
    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("darkmode", "enabled");
        if (btn) btn.textContent = "☀️";
    } else {
        localStorage.removeItem("darkmode");
        if (btn) btn.textContent = "🌙";
    }
});
</script>

<script>
setTimeout(() => {
    document.querySelectorAll('.flash-msg').forEach(el => {
        el.style.transition = "opacity 0.5s";
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 500); 
    });
}, 3000); 

</script>

<script>
document.querySelectorAll(".template-btn").forEach(btn => {
    btn.addEventListener("click", () => {

        const title = btn.dataset.title;
        const duration = parseInt(btn.dataset.duration);
        const importance = btn.dataset.importance;

        document.getElementById("taskTitle").value = title;

        document.querySelector('select[name="importance"]').value = importance;

        const lowOpts = document.getElementById("low-options");
        lowOpts.style.display = importance === "low" ? "block" : "none";

        const startInput = document.getElementById("startTime");
        const endInput = document.getElementById("endTime");

        if (startInput.value) {
            const [h, m] = startInput.value.split(":").map(Number);
            const total = h * 60 + m + duration;
            const endH = String(Math.floor(total / 60)).padStart(2, "0");
            const endM = String(total % 60).padStart(2, "0");
            endInput.value = `${endH}:${endM}`;
        } else {
            endInput.value = "";
            startInput.focus();
        }

    });
});
</script>
